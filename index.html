            background-color: #fff; /* Tránh bị đen nền khi chưa tải xong */
        }

        .controls {
            position: fixed; bottom: 20px; left: 50%;

        }

        .controls b { color: #00d4ff; margin-left: 10px; }

        .slide-number {
            position: fixed; top: 15px; right: 20px;
            background: rgba(0,0,0,0.6); padding: 6px 15px;
            border-radius: 20px; color: #00d4ff; 
            font-weight: bold; font-size: 14px;
            z-index: 1001;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        /* Thanh tiến trình (ProgressBar) ở trên cùng */
        #progress-bar {
            position: fixed; top: 0; left: 0;
            height: 4px; background: #00d4ff;
            width: 0%; transition: width 0.3s ease;
            z-index: 1002;
        }
    </style>
</head>

    <script>
        const slides = [
            "GiaoDienChinh.html",
            "1_slide_LyDoChonDeTai1.html",
            "2_slide_boCucBaoCao.html",
            "3_slide_CoSoLyLuan.html",
            "4_slide_TongQuanTaiLieu.html",
            "5_slide_TongQuanveTinhHinh.html",
            "6_duLieuVaBienSo.html",
            "7_slide_QuyTrinhVaMoHinh.html",
            "8_slide_thongKeMotaDuLieu.html",
            "9_slide_HieuSuatMoHinh.html",
            "10_slide_phanTichSHAP.html",
            "11_slide_KiemDinhGiaDinh.html",
            "12_slide_KetLuan.html",
            "13_slide_ketThuc.html"
        ];
        let currentIndex = 0;
        const iframe = document.getElementById('slide-container');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');

        function updateSlide(index) {
            if (index >= 0 && index < slides.length) {
                currentIndex = index;
                iframe.style.opacity = "0.5"; // Hiệu ứng mờ khi đang chuyển
                iframe.src = slides[currentIndex];
                
                // Cập nhật thanh tiến trình và số slide
                const progress = ((currentIndex + 1) / slides.length) * 100;
                progressBar.style.width = progress + "%";
                status.innerText = `Slide ${currentIndex + 1} / ${slides.length}`;
            }
        }

        const handleKeyDown = (e) => {
            const key = e.key;
            
            // Điều hướng chính
            if (key === "Home") { e.preventDefault(); updateSlide(0); }
            else if (key === "End") { e.preventDefault(); updateSlide(slides.length - 1); }
            else if (["ArrowRight", " ", "PageDown"].includes(key)) {
                e.preventDefault();
                if (currentIndex < slides.length - 1) updateSlide(currentIndex + 1);
            }
            else if (["ArrowLeft", "PageUp", "Backspace"].includes(key)) {
                e.preventDefault();
                if (currentIndex > 0) updateSlide(currentIndex - 1);
            }
            else if (key.toLowerCase() === "r") { // Phím R để reset lại slide hiện tại
                e.preventDefault();
                iframe.src = slides[currentIndex];
            }
        };

        // Lắng nghe phím bấm tại trang chính
        window.addEventListener('keydown', handleKeyDown);

        iframe.onload = function() {
            iframe.style.opacity = "1"; // Hiện rõ lại khi tải xong
            
            try {
                const innerWin = iframe.contentWindow;

                // 1. Đồng bộ phím bấm từ slide con lên slide cha
                innerWin.addEventListener('keydown', handleKeyDown);

                // 2. Xử lý click chuột: Nếu click vào khoảng trống slide, trả focus về cha để phím bấm mượt
                innerWin.addEventListener('mousedown', function(e) {
                    // Nếu click vào các thành phần tương tác thì không giật focus
                    if (!["BUTTON", "A", "INPUT", "SELECT"].includes(e.target.tagName)) {
                        setTimeout(() => { window.focus(); }, 10);
                    }
                });

                // 3. Chặn các lỗi JS nội bộ của slide con để không hiện popup báo lỗi
                innerWin.onerror = function() { return true; };

                // 4. Ghi đè hàm adjustLayout nếu có lỗi null
                if (innerWin.adjustLayout) {
                    const originalFunc = innerWin.adjustLayout;
                    innerWin.adjustLayout = function() {
                        try { originalFunc(); } catch (e) { console.warn("Layout fix applied."); }
                    };
                }
            } catch (err) {
                // Lỗi này thường gặp khi mở trực tiếp file HTML (không qua server)
                console.warn("Mẹo: Chạy bằng Live Server (VS Code) để điều khiển mượt nhất.");
            }
        };
        // Tự động lấy focus khi khởi động
        window.focus();
        // Lắng nghe sự kiện từ slide con gửi lên qua postMessage
        window.addEventListener('message', function(event) {
            if (event.data.type === 'keydown') {
                // Tạo một đối tượng giả lập sự kiện để dùng lại hàm handleKeyDown có sẵn
                const fakeEvent = {
                    key: event.data.key,
                    preventDefault: () => {} 
                };
                handleKeyDown(fakeEvent);
            }
        });
        
    </script>
</body>
